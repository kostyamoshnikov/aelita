<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нет подключения — AELITA PRODUCTION</title>
<meta name="robots" content="noindex">
<style>html,body{height:100%;background:#0B0B0D;color:#E8E6E1;font-family:'Arial',sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.logo{margin-bottom:40px;opacity:.85}
.logo svg{width:48px;height:56px}
h1{font-size:13px;letter-spacing:.45em;text-transform:uppercase;color:#E8E6E1;margin-bottom:8px;font-weight:300}
h1 small{display:block;font-size:8px;letter-spacing:.6em;color:#C9B8A3;margin-top:4px}
.divider{width:40px;height:1px;background:#D6B57A;margin:32px auto;opacity:.5}
p{color:#C9B8A3;font-size:14px;line-height:1.7;max-width:28ch;margin-bottom:8px}
.hint{font-size:12px;color:rgba(201,184,163,.5);margin-top:4px}
.btn{display:inline-block;margin-top:32px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;padding:13px 28px;border:1px solid rgba(214,181,122,.4);color:#C9B8A3;text-decoration:none;transition:all .3s;cursor:pointer;background:none}
.btn:hover{border-color:#D6B57A;color:#D6B57A}
/* Возвращённые адресные media-правила (переопределяют собственную локальную базовую версию этой страницы) */
@media(max-width:600px) and (min-width:431px){h1{letter-spacing:.08em}}
@media(max-width:430px){h1{font-size:clamp(22px,8vw,32px);letter-spacing:.06em}}
@media(max-width:375px){h1{font-size:clamp(20px,9vw,28px);letter-spacing:.04em}}
</style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="1" x2="3" y2="55" stroke="#D6B57A" stroke-width="1.2"/>
      <line x1="24" y1="1" x2="45" y2="55" stroke="#E8E6E1" stroke-width="0.7" stroke-opacity="0.5"/>
      <line x1="9" y1="36" x2="39" y2="36" stroke="#D6B57A" stroke-width="0.9"/>
    </svg>
  </div>

  <h1>АЭЛИТА<small>ПРОДАКШЕН</small></h1>

  <div class="divider"></div>

  <p>Нет подключения к интернету</p>
  <p class="hint">Проверьте соединение и попробуйте снова</p>

  <button class="btn" onclick="window.location.reload()">Обновить страницу</button>
</body>
</html>
