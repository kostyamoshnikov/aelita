<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест Worker</title>
<style>
  body{background:#0B0B0D;color:#E8E6E1;font-family:sans-serif;padding:40px;max-width:600px;margin:0 auto}
  button{background:#D6B57A;color:#0B0B0D;border:none;padding:14px 28px;font-size:16px;cursor:pointer;margin:10px 0;width:100%;border-radius:2px}
  .result{background:#1A1A1F;padding:20px;margin-top:20px;border-left:2px solid #D6B57A;white-space:pre-wrap;font-size:13px}
  .ok{border-color:#4CAF50;color:#4CAF50}
  .err{border-color:#f44336;color:#f44336}
</style>
</head>
<body>
<h2>Тест через Cloudflare Worker</h2>
<button onclick="testWorker()">Отправить тест обоим →</button>
<div id="result" class="result" style="display:none"></div>
<script>
async function testWorker() {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'result';
  el.textContent = 'Отправляю...';
  try {
    const res = await fetch('https://withered-glade-64b6.kostyamoshnikov.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: '✅ <b>Тест AELITA PRODUCTION</b>\n\nWorker работает! Заявки будут приходить сюда.\n\n🕐 ' + new Date().toLocaleString('ru-RU', {timeZone:'Europe/Moscow'})})
    });
    const text = await res.text();
    el.className = 'result ok';
    el.textContent = 'Успешно! Ответ: ' + text + '\n\nПроверь Telegram — сообщение должно прийти обоим.';
  } catch(e) {
    el.className = 'result err';
    el.textContent = 'Ошибка: ' + e.message;
  }
}
</script>
</body>
</html>
