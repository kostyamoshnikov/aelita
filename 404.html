<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — AELITA PRODUCTION</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>html,body{height:100%;overflow-x:hidden}
body{background:var(--ink);color:var(--bone);font-family:'Inter',system-ui,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
.nav-in{display:flex;justify-content:space-between;align-items:center}
main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px}
.code{font-family:'Montserrat',sans-serif;font-size:clamp(80px,15vw,160px);font-weight:200;color:rgba(214,181,122,.12);line-height:1;letter-spacing:.05em;margin-bottom:-20px}
h1{font-family:'Montserrat',sans-serif;font-weight:200;font-size:clamp(18px,3vw,28px);letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px}
p{color:var(--sand);font-size:15px;margin-bottom:40px;max-width:40ch;margin-left:auto;margin-right:auto}
.links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:.28em;text-transform:uppercase;padding:14px 28px;transition:all .3s}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-outline{border:1px solid rgba(201,184,163,.35);color:var(--sand)}
footer{padding:24px 0;border-top:1px solid rgba(232,230,225,.07);text-align:center}
footer p{color:rgba(201,184,163,.4);font-size:12px}</style>
</head>
<body>
<nav><div class="wrap nav-in">
  <a class="logo" href="/">АЭЛИТА<small>ПРОДАКШЕН</small></a>
</div></nav>

<main>
  <div>
    <div class="code">404</div>
    <h1>Страница не найдена</h1>
    <p>Возможно, страница была перемещена или её никогда не существовало.</p>
    <div class="links">
      <a class="btn btn-gold" href="/">На главную</a>
      <a class="btn btn-outline" href="/tickets">Афиша</a>
      <a class="btn btn-outline" href="/projects">Проекты</a>
    </div>
  </div>
</main>

<footer><div class="wrap">
  <p>© 2026 AELITA PRODUCTION</p>
</div></footer>

<script>
  // Автоматический редирект через 10 секунд
  setTimeout(()=>{ window.location.href='/'; }, 10000);
</script>
</body>
</html>
